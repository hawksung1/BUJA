# Streamlit 설정 파일

[server]
# 브라우저 자동 열기 방지
headless = true

# 파일 변경 시 자동 재기동
runOnSave = true

# 파일 감시 타입
fileWatcherType = "auto"

# 포트 설정
port = 8501

# 주소 설정
address = "localhost"

[browser]
# 사용 통계 수집 비활성화
gatherUsageStats = false

# 서버 시작 시 브라우저 자동 열기 비활성화
serverAddress = "localhost"
serverPort = 8501

[theme]
# 테마 설정 (선택사항)
primaryColor = "#FF6B6B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[runner]
# 빠른 리로드 활성화
fastReruns = true

# 매직 명령어 허용
magicEnabled = true

