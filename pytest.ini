[pytest]
# pytest 설정
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 마커 설정
markers =
    unit: 단위 테스트
    integration: 통합 테스트
    e2e: E2E 테스트
    slow: 느린 테스트
    playwright: Playwright MCP를 사용하는 테스트
    asyncio: 비동기 테스트
    ui: UI tests (browser-based)
    ui_functionality: UI functionality tests
    ui: UI tests (browser-based)
    ui_functionality: UI functionality tests

# 비동기 테스트 설정
asyncio_mode = auto

# 출력 옵션
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=80

# 커버리지 제외
[coverage:run]
source = src
omit =
    */tests/*
    */migrations/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

